version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pabandi-db
    restart: always
    environment:
      POSTGRES_USER: pabandi_user
      POSTGRES_PASSWORD: pabandi_secure_password
      POSTGRES_DB: pabandi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: pabandi-backend
    restart: always
    depends_on:
      - db
    environment:
      - NODE_ENV=production
      - PORT=5000
      # Use the container name "db" as the host since they are on the same docker network
      - DATABASE_URL=postgresql://pabandi_user:pabandi_secure_password@db:5432/pabandi?schema=public
      - TIKTOK_APP_SECRET=demo_tiktok_secret
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: pabandi-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  # Persistent volume so the Zero-Knowledge database is never wiped on restart
  pgdata:
