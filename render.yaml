# Render.com backend configuration
# This file tells Render how to deploy the server
services:
  - type: web
    name: pabandi-server
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    region: oregon
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: "24h"
      - key: FRONTEND_URL
        value: "https://karachi-services-hub.web.app"
      - key: SAFEPAY_API_KEY
        sync: false
      - key: SAFEPAY_SECRET_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
